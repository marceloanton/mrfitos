name: Process Expired Trials

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate secrets
        run: |
          test -n "${{ secrets.APP_BASE_URL }}" || (echo "Missing APP_BASE_URL secret" && exit 1)
          test -n "${{ secrets.CRON_BEARER_TOKEN }}" || (echo "Missing CRON_BEARER_TOKEN secret" && exit 1)

      - name: Call expired trials endpoint (with retry)
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_BEARER_TOKEN: ${{ secrets.CRON_BEARER_TOKEN }}
        run: |
          set -euo pipefail
          URL="${APP_BASE_URL%/}/cron/subscription/process-expired-trials"
          echo "Calling: $URL"

          for i in 1 2 3; do
            HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
              -X POST "$URL" \
              -H "Authorization: Bearer $CRON_BEARER_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{}')

            echo "Attempt $i HTTP $HTTP_CODE"
            cat response.json
            echo

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "Process expired trials OK"
              exit 0
            fi

            sleep $((i * 5))
          done

          echo "Process expired trials failed after retries"
          exit 1
