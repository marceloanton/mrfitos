name: Billing Conversion Alert

on:
  schedule:
    - cron: "27 3 * * *"
  workflow_dispatch:
    inputs:
      threshold:
        description: "Override threshold percentage (default 35)"
        required: false
        type: string

jobs:
  conversion-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate secrets
        run: |
          test -n "${{ secrets.APP_BASE_URL }}" || (echo "Missing APP_BASE_URL secret" && exit 1)
          test -n "${{ secrets.CRON_BEARER_TOKEN }}" || (echo "Missing CRON_BEARER_TOKEN secret" && exit 1)

      - name: Call conversion alert endpoint (with retry)
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_BEARER_TOKEN: ${{ secrets.CRON_BEARER_TOKEN }}
          DEFAULT_THRESHOLD: ${{ vars.CONVERSION_ALERT_THRESHOLD }}
          DISPATCH_THRESHOLD: ${{ github.event.inputs.threshold }}
        run: |
          set -euo pipefail
          URL="${APP_BASE_URL%/}/cron/billing/conversion-alert"
          THRESHOLD="${DISPATCH_THRESHOLD:-${DEFAULT_THRESHOLD:-35}}"

          echo "Calling: $URL"
          echo "Threshold: $THRESHOLD"

          for i in 1 2 3; do
            HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
              -X POST "$URL" \
              -H "Authorization: Bearer $CRON_BEARER_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"threshold\":$THRESHOLD}")

            echo "Attempt $i HTTP $HTTP_CODE"
            cat response.json
            echo

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "Billing conversion alert OK"
              exit 0
            fi

            sleep $((i * 5))
          done

          echo "Billing conversion alert failed after retries"
          exit 1
